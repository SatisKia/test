<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="target-densitydpi=device-dpi, width=600, user-scalable=no" />
<title></title>
<script type="text/javascript" src="d2js.js"></script>
<script type="text/javascript" src="audio.js"></script>
<script type="text/javascript">

window.onload = d2js_onload;
window.onorientationchange = d2js_onorientationchange;
window.onresize = d2js_onresize;

var COLOR_BASE_LIGHT;
var COLOR_BASE_FACE;
var COLOR_BASE_SHADOW;
var COLOR_BUTTON_LIGHT;
var COLOR_BUTTON_FACE;
var COLOR_BUTTON_SHADOW;
var COLOR_BUTTON_DSHADOW;
var COLOR_BUTTON_TEXT;
var COLOR_G;
var COLOR_K;
var COLOR_W;

var TYPE = [
  "audio/3gpp",
  "audio/3gpp2",
  "audio/aac",
  "audio/aacp",
  "audio/amr",
  "audio/basic",
  "audio/midi",
  "audio/mp3",
  "audio/mp4",
  "audio/mpeg",
  "audio/ogg",
  "audio/wav",
  "audio/x-aiff",
  "audio/x-wav"
];

var g;

var can_use_audio;
var can_play_type;

var audio_loaded = false;
var audio;
var audio_pause;
var audio_stop;
var audio_type;
var audio_loop = false;

var audio_index = 0;
var audio_back;
var audio_next;

function frameTime(){ return 1000 / 15/*フレーム*/; }

function audioExElement(){
  var userAgent = window.navigator.userAgent.toLowerCase();
  if( userAgent.indexOf( "msie" ) >= 0 ){
    return "bgsound";
  }
  return "embed";
}

function init(){
  _USE_AUDIOEX = true;
  _USE_KEY = true;
  _USE_LAYOUTMOUSE = true;
}

function start(){
  setCurrent( "canvas0" );

  g = getGraphics();

  g.setStrokeWidth( 2.0 );

  COLOR_BASE_LIGHT     = g.getColorOfRGB( 100, 100, 110 );
  COLOR_BASE_FACE      = g.getColorOfRGB(  60,  60,  90 );
  COLOR_BASE_SHADOW    = g.getColorOfRGB(  20,  20,  30 );
  COLOR_BUTTON_LIGHT   = g.getColorOfRGB( 240, 255, 255 );
  COLOR_BUTTON_FACE    = g.getColorOfRGB( 190, 200, 210 );
  COLOR_BUTTON_SHADOW  = g.getColorOfRGB( 120, 130, 150 );
  COLOR_BUTTON_DSHADOW = g.getColorOfRGB(  90, 100, 120 );
  COLOR_BUTTON_TEXT    = g.getColorOfRGB(  50,  60,  80 );
  COLOR_G              = g.getColorOfRGB(   0, 230,   0 );
  COLOR_K              = g.getColorOfRGB(   0,   0,   0 );
  COLOR_W              = g.getColorOfRGB( 255, 255, 255 );

  can_use_audio = canUseAudio();
  can_play_type = new Array( TYPE.length );
  for( var i = 0; i < TYPE.length; i++ ){
    can_play_type[i] = canPlayType( TYPE[i] );
  }

  myLoadAudio();

  addLayout(  20, 125, 80, 45, 0 );
  addLayout( 100, 125, 80, 45, 1 );
  addLayout( 180, 125, 80, 45, 2 );
  addLayout( 270, 130, 75, 35, 3 );
  addLayout( 345, 130, 75, 35, 4 );
  addLayout( 420, 130, 75, 35, 5 );
  addLayout( 495, 130, 75, 35, 6 );
  addLayout( 495,  60, 75, 40, 7 );
  addLayout(   0,   0, 60, 30, 8 );
  addLayout( 540,   0, 60, 30, 9 );

  return true;
}

function drawTitleWindow( x, y, w, h, str ){
  g.setColor( COLOR_BASE_SHADOW );
  g.fillRect( x, y, w, h );
  g.setColor( COLOR_BASE_LIGHT );
  g.fillRect( x + 1, y + 1, w - 1, h - 1 );
  g.setColor( COLOR_K );
  g.fillRect( x + 1, y + 1, w - 2, h - 2 );
  g.setColor( COLOR_G );
  g.drawString( str, x + 10, (y + h / 2) + (g.fontHeight() / 2) );
}

function drawButton( x, y, w, h, str, down ){
  if( down ){
    g.setColor( COLOR_BUTTON_SHADOW );
    g.fillRect( x, y, w, h );
    g.setColor( COLOR_BUTTON_FACE );
    g.fillRect( x + 2, y + 2, w - 2, h - 2 );
    g.setColor( COLOR_BUTTON_DSHADOW );
    g.fillRect( x, y, w - 2, h - 2 );
    g.setColor( COLOR_BUTTON_SHADOW );
    g.fillRect( x + 2, y + 2, w - 4, h - 4 );
  } else {
    g.setColor( COLOR_BUTTON_FACE );
    g.fillRect( x, y, w, h );
    g.setColor( COLOR_BUTTON_SHADOW );
    g.fillRect( x + 2, y + 2, w - 2, h - 2 );
    g.setColor( COLOR_BUTTON_LIGHT );
    g.fillRect( x, y, w - 2, h - 2 );
    g.setColor( COLOR_BUTTON_FACE );
    g.fillRect( x + 2, y + 2, w - 4, h - 4 );
  }
  g.setColor( COLOR_BUTTON_TEXT );
  g.drawString( str, (x + w / 2) - (g.stringWidth( str ) / 2), (y + h / 2) + (g.fontHeight() / 2) );
}

function paint( g ){
  var i;
  var tmp;

  g.setColor( COLOR_BASE_FACE );
  g.fillRect( 0, 0, 600, 480 );
  g.setColor( COLOR_BASE_SHADOW );
  g.fillRect( 3, 33, 600 - 3, 160 - 3 );
  g.setColor( COLOR_BASE_LIGHT );
  g.fillRect( 0, 30, 600 - 3, 160 - 3 );
  g.setColor( COLOR_BASE_FACE );
  g.fillRect( 3, 33, 600 - 6, 160 - 6 );

  g.setColor( COLOR_BASE_SHADOW );
  g.drawLine( 0, 188, 599, 188 );
  g.setColor( COLOR_BASE_LIGHT );
  g.drawLine( 0, 190, 599, 190 );

  g.setFont( 24, "ＭＳ Ｐゴシック" );
  g.setColor( COLOR_W );
  g.drawString( "audio : " + (can_use_audio ? "true" : "false"), 15, 220 );
  for( i = 1; i < TYPE.length + 1; i++ ){
    g.drawString( TYPE[i - 1] + " : " + (can_play_type[i - 1] ? "true" : "false"), 300 * _DIV( i, 10 ) + 15, 220 + 28 * _MOD(i, 10) );
  }

  g.setFont( 20, "ＭＳ Ｐゴシック" );
  if( (tmp = getLayout( 8 )) != null ){
    drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "\u2190", audio_back );
  }
  audio_back = false;
  if( (tmp = getLayout( 9 )) != null ){
    drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "\u2192", audio_next );
  }
  audio_next = false;
  tmp = (audio_index + 1) + " / " + audioSrc.length;
  g.setColor( COLOR_W );
  g.drawString( tmp, (600 / 2) - (g.stringWidth( tmp ) / 2), 15 + (g.fontHeight() / 2) );

  g.setFont( 30, "ＭＳ Ｐゴシック" );
  if( can_use_audio && (audio_type == 0) ){
    drawTitleWindow( 20, 55, 600 - 140, 50, audioSrc[audio_index] + " " + getCurrentTime( audio ) );
  } else {
    drawTitleWindow( 20, 55, 600 - 140, 50, audioSrc[audio_index] );
  }

  g.setFont( 24, "ＭＳ Ｐゴシック" );
  if( (tmp = getLayout( 0 )) != null ){
    if( audio == null ){
      drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "LOAD", false );
    } else if( (audio_type != 0) || isLoaded( audio ) ){
      if( audio_type == 0 ){
        drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "PLAY", isPlaying( audio ) );
      } else {
        drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "PLAY", isPlayingEx( audio ) );
      }
    } else {
      if( audio_type == 0 ){
        drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "" + audio.element.readyState, false );
      } else {
        drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "", false );
      }
    }
  }
  if( (tmp = getLayout( 1 )) != null ){
    drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "PAUSE", audio_pause );
  }
  if( (tmp = getLayout( 2 )) != null ){
    drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "STOP", audio_stop );
  }
  audio_stop = false;

  g.setFont( 18, "ＭＳ Ｐゴシック" );
  if( can_use_audio ){
    if( (tmp = getLayout( 3 )) != null ){
      drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "Audio", audio_type == 0 );
    }
  }
  if( (tmp = getLayout( 4 )) != null ){
    drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "audio", audio_type == 1 );
  }
  if( (tmp = getLayout( 5 )) != null ){
    drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "bgsound", audio_type == 2 );
  }
  if( (tmp = getLayout( 6 )) != null ){
    drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "embed", audio_type == 3 );
  }

  g.setFont( 25, "ＭＳ Ｐゴシック" );
  if( (tmp = getLayout( 7 )) != null ){
    drawButton( tmp.x, tmp.y, tmp.width, tmp.height, "LOOP", audio_loop );
  }
}

function myPrevAudio(){
  audio_back = true;
  audio_index--;
  if( audio_index < 0 ){
    audio_index = audioSrc.length - 1;
  }
  myLoadAudio();
}

function myNextAudio(){
  audio_next = true;
  audio_index++;
  if( audio_index > audioSrc.length - 1 ){
    audio_index = 0;
  }
  myLoadAudio();
}

function myLoadAudio(){
  myStopAudio();
  audio = loadAudio( audioSrc[audio_index] );
  audio_pause = false;
  audio_stop  = false;
  audio_type  = can_use_audio ? 0 : 1;
  //audio_loop  = false;
}

function myStopAudio(){
  if( audio_type == 0 ){
    stopAudio( audio );
  } else {
    stopAudioEx( audio );
  }
  audio_pause = false;
}

function processEvent( type, param ){
  if( type == _KEY_PRESSED_EVENT ){
    if( param == _KEY_LEFT ){
      myPrevAudio();
    }
    if( param == _KEY_RIGHT ){
      myNextAudio();
    }
  }
  if( type == _LAYOUT_DOWN_EVENT ){
    switch( param ){
    case 0:
      if( audio_pause ){
        restartAudio( audio );
        audio_pause = false;
      } else {
        if( audio == null ){
          switch( audio_type ){
          case 0: audio = loadAndPlayAudio( audioSrc[audio_index], audio_loop ); break;
          case 1: audio = loadAndPlayAudioEx( audioSrc[audio_index], audio_loop, "audio" ); break;
          case 2: audio = loadAndPlayAudioEx( audioSrc[audio_index], audio_loop, "bgsound" ); break;
          case 3: audio = loadAndPlayAudioEx( audioSrc[audio_index], audio_loop, "embed" ); break;
          }
        } else if( (audio_type != 0) || isLoaded( audio ) ){
          switch( audio_type ){
          case 0: playAudio( audio, audio_loop ); break;
          case 1: playAudioEx( audio, audio_loop, "audio" ); break;
          case 2: playAudioEx( audio, audio_loop, "bgsound" ); break;
          case 3: playAudioEx( audio, audio_loop, "embed" ); break;
          }
        }
      }
      break;
    case 1:
      if( can_use_audio ){
        if( audio_type == 0 ){
          if( audio_pause ){
            restartAudio( audio );
            audio_pause = false;
          } else if( isPlaying( audio ) ){
            pauseAudio( audio );
            audio_pause = true;
          }
        }
      }
      break;
    case 2:
      myStopAudio();
      audio_stop = true;
      break;
    case 3:
      if( can_use_audio ){
        myStopAudio();
        audio_type = 0;
        audio = loadAudio( audioSrc[audio_index] );
      }
      break;
    case 4:
      myStopAudio();
      audio_type = 1;
      audio = loadAudioEx( audioSrc[audio_index] );
      break;
    case 5:
      myStopAudio();
      audio_type = 2;
      audio = loadAudioEx( audioSrc[audio_index] );
      break;
    case 6:
      myStopAudio();
      audio_type = 3;
      audio = loadAudioEx( audioSrc[audio_index] );
      break;
    case 7:
      myStopAudio();
      audio_loop = !audio_loop;
      reloadAudio( audio );
      break;
    case 8:
      myPrevAudio();
      break;
    case 9:
      myNextAudio();
      break;
    }
  }
}

function error(){
}

</script>
<style type="text/css">
html, body {
	margin:0;
	padding:0;
}
</style>
</head>
<body>
<div align="center">
<canvas id="canvas0" width="600" height="480"></canvas>
</div>
</body>
</html>
